<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OneClick Video Downloader</title>

    <style>
        body {
            width: 300px;
            margin: 0;
            padding: 18px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            color: #1c1c1e;
        }

        h2 {
            margin: 0 0 14px;
            text-align: center;
            font-size: 17px;
        }

        button {
            width: 100%;
            height: 44px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007AFF;
            color: white;
        }

        button:hover { background: #0062cc; }
        button:disabled { background: #b0b0b0; cursor: default; }

        .section-title {
            font-size: 12px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin: 0 0 6px;
        }

        #folders {
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        .folder {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f2;
            gap: 8px;
        }
        .folder:last-child { border-bottom: none; }

        .folder input[type="radio"] { margin: 0; flex: 0 0 auto; }

        .folder-info { flex: 1 1 auto; min-width: 0; }
        .folder-label { font-size: 14px; font-weight: 500; }
        .folder-path {
            font-size: 11px;
            color: #8e8e93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: rtl;
            text-align: left;
        }

        .remove-btn {
            flex: 0 0 auto;
            width: 22px; height: 22px;
            line-height: 20px;
            padding: 0;
            font-size: 15px;
            background: transparent;
            color: #c7c7cc;
            border-radius: 4px;
        }
        .remove-btn:hover { background: #ffe5e5; color: #ff3b30; }

        .empty {
            padding: 14px 10px;
            font-size: 13px;
            color: #8e8e93;
            text-align: center;
        }

        #addFolder {
            height: 34px;
            font-size: 13px;
            background: #f2f2f7;
            color: #007AFF;
            margin-bottom: 16px;
        }
        #addFolder:hover { background: #e5e5ea; }

        #progress {
            margin-top: 14px;
            height: 8px;
            background: #e5e5ea;
            border-radius: 4px;
            overflow: hidden;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: #007AFF;
            border-radius: 4px;
            transition: width 0.2s ease;
        }
        #progress.indeterminate #progressBar {
            width: 40%;
            animation: slide 1.1s ease-in-out infinite;
        }
        @keyframes slide {
            0%   { margin-left: -40%; }
            100% { margin-left: 100%; }
        }
        .hidden { display: none; }

        #preview {
            margin-bottom: 16px;
        }
        #thumb {
            width: 100%;
            border-radius: 8px;
            display: block;
            background: #f2f2f7;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        #title {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.3;
            color: #1c1c1e;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #preview.checking {
            text-align: center;
            font-size: 13px;
            color: #8e8e93;
            padding: 10px 0;
        }

        #status {
            margin-top: 12px;
            color: #666;
            text-align: center;
            font-size: 13px;
            min-height: 16px;
            word-break: break-word;
        }
    </style>
</head>

<body>

<h2>OneClick Video Downloader</h2>

<div id="preview" class="hidden">
    <img id="thumb" alt="">
    <div id="title"></div>
</div>

<p class="section-title">Save to</p>
<div id="folders"></div>
<button id="addFolder">+ Add folder…</button>

<button id="downloadButton">⬇ Download Current Video</button>

<div id="progress" class="hidden"><div id="progressBar"></div></div>

<div id="status">Ready</div>

<script src="popup.js"></script>

</body>
</html>
